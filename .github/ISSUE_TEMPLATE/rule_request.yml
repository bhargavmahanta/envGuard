name: Rule request
description: Suggest a new detection rule.
title: "[Rule]: "
labels: ["rule-request"]
body:
  - type: input
    id: rule
    attributes:
      label: Proposed rule name
    validations:
      required: true
  - type: textarea
    id: detection
    attributes:
      label: Detection idea
      description: Include safe synthetic examples only.
    validations:
      required: true
  - type: textarea
    id: remediation
    attributes:
      label: Recommended remediation
    validations:
      required: true
