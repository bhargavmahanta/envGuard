name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Run sample scan
        run: node packages/envguard/dist/cli.js scan examples/vulnerable-project --format json --output sample-report.json

      - name: Test packed package consumers
        run: npm run test:package

      - name: Check npm package contents
        run: npm pack --dry-run --workspaces

  node-compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
