name: Release Candidate

on:
  workflow_dispatch:
    inputs:
      release-ref:
        description: Exact branch, tag, or commit to publish.
        required: true
        default: adoption-roadmap
      bootstrap-new-packages:
        description: Use the protected one-time npm token to create package names that do not exist yet.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency: envguard-release-candidate

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-release
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release-ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install supported npm CLI
        run: npm install --global npm@11.15.0

      - run: npm ci
      - run: node scripts/assert-release-channel.mjs --prerelease
      - run: npm run release:dry

      - name: Publish with trusted publishing
        if: ${{ !inputs.bootstrap-new-packages }}
        run: npm run release:publish:next

      - name: Bootstrap new package names
        if: ${{ inputs.bootstrap-new-packages }}
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::error::NPM_BOOTSTRAP_TOKEN is required when bootstrap-new-packages is enabled."
            exit 1
          fi
          npm run release:publish:next
