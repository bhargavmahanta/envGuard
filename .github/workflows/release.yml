name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-release

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install supported npm CLI
        run: npm install --global npm@11.15.0

      - run: npm ci
      - run: node scripts/assert-release-channel.mjs --stable
      - run: npm run release:dry

      - uses: changesets/action@v1
        id: changesets
        with:
          version: npm run release:version
          publish: npm run release:publish
          title: "chore: release envguard packages"
          commit: "chore: release envguard packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
