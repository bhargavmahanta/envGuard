name: EnvGuard Configuration Security
description: Find insecure environment values and Docker, CI, Kubernetes, and runtime configuration before production.
author: Bhargav Mahanta
branding:
  icon: shield
  color: green
inputs:
  target:
    description: Project path to scan.
    required: false
    default: .
  fail-on:
    description: Minimum severity that fails the workflow.
    required: false
    default: high
  minimum-severity:
    description: Minimum severity included in results.
    required: false
  config-path:
    description: Explicit EnvGuard config path.
    required: false
  baseline-path:
    description: Explicit EnvGuard baseline path.
    required: false
  sarif-path:
    description: Optional path where a masked SARIF report is written.
    required: false
outputs:
  passed:
    description: Whether the scan passed the configured policy.
  findings-count:
    description: Number of findings after filtering and baseline suppression.
  highest-severity:
    description: Highest reported finding severity.
  sarif-path:
    description: SARIF path when requested.
runs:
  using: node24
  main: integrations/envguard-action/dist/index.js
